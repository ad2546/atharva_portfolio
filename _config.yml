# Site Configuration
title: "Atharva Deshmukh | Data Scientist & AI Engineer"
description: "Portfolio of Atharva Deshmukh, a Data Scientist and AI Engineer building GenAI systems, multi-agent workflows, and production ML solutions."
author: "Atharva Deshmukh"
lang: "en_US"
baseurl: "/atharva_portfolio"
url: "https://ad2546.github.io"
theme: minima
markdown: kramdown
logo: "/assets/media/me.JPG"

social:
  name: "Atharva Deshmukh"
  links:
    - "https://github.com/ad2546"
    - "https://www.linkedin.com/in/atharva-deshmuk/"
    - "mailto:ad2546@rit.edu"

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclusions
exclude:
  - "*.md" # Exclude Markdown files if you only want to serve HTML
  - README.md

# Source file for the site
defaults:
  - scope:
      path: ""
      type: "html"
    values:
      layout: null # Ensures custom HTML files are directly served
